version: '3.8'

services:
  # MongoDB 数据库服务
  mongodb:
    image: mongo:7.0
    container_name: nogo-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: explorer
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-ChangeMe123!SecurePassword}
      MONGO_INITDB_DATABASE: explorerDB
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "27017:27017"
    networks:
      - nogo-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # NogoChain Explorer 应用
  explorer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nogo-explorer
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://explorer:${MONGODB_PASSWORD:-ChangeMe123!SecurePassword}@mongodb:27017/explorerDB?authSource=explorerDB
      - WEB3_PROVIDER_URL=${WEB3_PROVIDER_URL:-http://host.docker.internal:8545}
      - WS_PROVIDER_URL=${WS_PROVIDER_URL:-ws://host.docker.internal:8546}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - nogo-network
    volumes:
      - ./config.json:/app/config.json:ro
      - explorer_logs:/app/logs
    command: >
      sh -c "npm run create-indexes && npm run start"

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: nogo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - explorer
    networks:
      - nogo-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  explorer_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  nogo-network:
    driver: bridge
